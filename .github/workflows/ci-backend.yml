name: CI - Backend Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar compilacion NestJS (Build)
        run: npm run build
        